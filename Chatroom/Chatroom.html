<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chatvia | Premium Messaging</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Outfit:wght@600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Bootstrap CSS for modals -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../responsive_code/chatroom-responsive.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#e5e1e4",
                        "inverse-surface": "#e5e1e4",
                        "tertiary": "#ffb4aa",
                        "outline": "#9d8ba0",
                        "surface": "#131315",
                        "surface-container-low": "#1c1b1d",
                        "on-tertiary": "#690003",
                        "primary": "#ebb2ff",
                        "secondary": "#bdf4ff",
                        "inverse-primary": "#9800d0",
                        "surface-container": "#201f21",
                        "on-secondary-fixed-variant": "#004f58",
                        "secondary-fixed-dim": "#00daf3",
                        "surface-container-lowest": "#0e0e10",
                        "on-primary-container": "#ffffff",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#ebb2ff",
                        "on-primary-fixed-variant": "#74009f",
                        "on-background": "#e5e1e4",
                        "surface-dim": "#131315",
                        "surface-variant": "#353437",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "background": "#131315",
                        "inverse-on-surface": "#313032",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "primary-fixed": "#f8d8ff",
                        "on-tertiary-fixed": "#410001",
                        "on-surface-variant": "#d4c0d7",
                        "on-primary": "#520072",
                        "primary-container": "#bc13fe",
                        "surface-tint": "#ebb2ff",
                        "on-primary-fixed": "#320047",
                        "surface-container-high": "#2a2a2c",
                        "on-tertiary-fixed-variant": "#930005",
                        "surface-bright": "#39393b",
                        "surface-container-highest": "#353437",
                        "tertiary-container": "#e62721",
                        "on-secondary": "#00363d",
                        "on-secondary-container": "#00616d",
                        "secondary-fixed": "#9cf0ff",
                        "outline-variant": "#504254",
                        "on-tertiary-container": "#140000",
                        "on-secondary-fixed": "#001f24",
                        "secondary-container": "#00e3fd",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffdad5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "panel-width-sm": "320px",
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "panel-width-md": "400px"
                    },
                    "fontFamily": {
                        "title-sm": ["Outfit"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Outfit"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Outfit"],
                        "body-md": ["Inter"],
                        "headline-md-mobile": ["Outfit"],
                        "label-bold": ["Inter"]
                    },
                    "fontSize": {
                        "title-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-surface text-on-surface font-body-md selection:bg-primary/30 overflow-hidden">
    <!-- Global Background Elements -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/10 blur-[120px]">
        </div>
    </div>

    <!-- Layout Wrapper -->
    <div class="relative z-10 flex h-screen w-full overflow-hidden">
        <!-- SideNavBar -->
        <aside
            class="h-screen w-[80px] md:w-panel-width-sm hidden md:flex flex-col bg-surface-container-low/30 backdrop-blur-lg border-r border-outline-variant/10 py-8 gap-y-4 shadow-2xl shadow-primary/5">
            <div class="px-6 mb-8">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fluid</span>
                    </div>
                    <div class="hidden md:block">
                        <h1 class="font-headline-md text-primary leading-tight">Chatvia</h1>
                        <p class="text-xs text-on-surface-variant font-label-sm uppercase tracking-widest opacity-70">
                            Premium Messaging</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-2 flex flex-col">
                <!-- Navigation Items -->
                <a id="userListBtn"
                    class="group flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/20 transition-all rounded-lg"
                    href="#">
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform"
                        style="font-variation-settings: 'FILL' 1;">forum</span>
                    <span class="font-body-md hidden md:inline">Messages</span>
                </a>
                <a id="allUsersBtn"
                    class="group flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/20 transition-all rounded-lg"
                    href="#">
                    <span
                        class="material-symbols-outlined group-hover:translate-x-1 transition-transform">contacts</span>
                    <span class="font-body-md hidden md:inline">Find Users</span>
                </a>
                <a id="ProfileIcon"
                    class="group flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/20 transition-all rounded-lg"
                    href="#">
                    <span
                        class="material-symbols-outlined group-hover:translate-x-1 transition-transform">settings</span>
                    <span class="font-body-md hidden md:inline">Profile</span>
                </a>
                <a id="logoutBtn"
                    class="group flex items-center gap-4 px-4 py-3 text-error hover:text-error hover:bg-error/10 transition-all rounded-lg mt-auto"
                    href="#">
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">logout</span>
                    <span class="font-body-md hidden md:inline">Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Conversation List Panel -->
        <section id="secondarySlider"
            class="hidden flex-col w-[300px] md:w-panel-width-md bg-surface-container-lowest/50 backdrop-blur-md border-r border-outline-variant/10">
            <header class="h-16 flex items-center justify-between px-6 border-b border-outline-variant/10">
                <h2 class="font-title-sm text-on-surface">Chats</h2>
            </header>
            <div class="p-4">
                <div class="relative group">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                    <input autocomplete="off" class="w-full bg-surface-variant/20 border-none rounded-xl py-2.5 pl-10 pr-4 text-body-md placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/50 transition-all glass-border"
                        placeholder="Search conversations..." type="text" />
                </div>
            </div>
            <div id="userListPanel" class="flex-1 overflow-y-auto scrollbar-hide space-y-1 px-2">
                <!-- JS populates this -->
            </div>
        </section>

        <!-- Main Chat Window -->
        <main id="mainContent" class="flex-1 flex flex-col bg-transparent overflow-hidden relative">
            <div
                class="content chatvia-main d-flex flex-column justify-content-center align-items-center text-center h-100">
                <h3 class="font-display-lg text-primary tracking-tight mb-2">Chatvia</h3>
                <p class="font-body-md text-on-surface-variant" style="max-width: 450px;">
                    Send and receive messages with premium encryption.
                </p>
            </div>
        </main>

        <!-- Mobile Bottom Navigation Bar -->
        <nav id="mobileBottomNav" class="mobile-bottom-nav fixed bottom-0 left-0 w-full bg-surface-container-high/90 backdrop-blur-xl border-t border-outline-variant/20 flex justify-around items-center h-16 z-50 md:hidden">
            <button id="mobileNavMessages" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors active:scale-95">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
                <span class="text-[10px] font-label-bold mt-1">Messages</span>
            </button>
            <button id="mobileNavUsers" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors active:scale-95">
                <span class="material-symbols-outlined">contacts</span>
                <span class="text-[10px] font-label-bold mt-1">Find Users</span>
            </button>
            <button id="mobileNavProfile" class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors active:scale-95">
                <span class="material-symbols-outlined">settings</span>
                <span class="text-[10px] font-label-bold mt-1">Profile</span>
            </button>
        </nav>
    </div>

    <!-- modal for the photo preview while sending  -->
    <div class="modal fade" id="imagePreviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-surface-container-high text-on-surface border-outline-variant/20">
                <div class="modal-body text-center">
                    <!-- Image Preview -->
                    <img id="previewImage" src="" class="img-fluid rounded mb-3" alt="Preview">

                    <!-- Video preview -->
                    <video id="previewVideo" style="max-width:100%; display:none;" controls></video>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-secondary text-white" id="cancelImageBtn"
                            data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary bg-primary-container text-white" id="sendImageBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- modal for the video preview while sending  -->
    <div class="modal fade" id="chatVideoModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-surface-container-high text-on-surface border-outline-variant/20">
                <div class="modal-body text-center p-0">
                    <video id="chatVideoPreview" style="width:100%; max-height:80vh;" controls autoplay></video>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Docx Preview -->
    <div class="modal fade" id="docxPreviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-surface-container-high text-on-surface border-outline-variant/20">
                <div class="modal-body text-center">
                    <!-- File Icon -->
                    <i class="bi bi-file-earmark-word-fill text-primary" style="font-size:4rem;"></i>
                    <!-- File Details -->
                    <h5 id="docxFileName" class="mt-3 font-title-sm"></h5>
                    <p id="docxFileSize" class="text-on-surface-variant"></p>
                    <!-- Buttons -->
                    <div class="d-flex justify-content-between mt-3">
                        <button class="btn btn-secondary text-white" id="cancelDocxBtn"
                            data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary bg-primary-container text-white" id="sendDocxBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for PDF Preview -->
    <div class="modal fade" id="pdfPreviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-surface-container-high text-on-surface border-outline-variant/20">
                <div class="modal-body text-center">
                    <!-- File Icon -->
                    <i class="bi bi-file-earmark-pdf-fill text-danger" style="font-size:4rem;"></i>
                    <!-- File Details -->
                    <h5 id="pdfFileName" class="mt-3 font-title-sm"></h5>
                    <p id="pdfFileSize" class="text-on-surface-variant"></p>
                    <!-- Buttons -->
                    <div class="d-flex justify-content-between mt-3">
                        <button class="btn btn-secondary text-white" id="cancelPdfBtn"
                            data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary bg-primary-container text-white" id="sendPdfBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- modal for the photo / video preview after sent images -->
    <div class="modal fade" id="chatImageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0 text-center">
                <div class="modal-body p-0 d-flex justify-content-center">
                    <img id="chatImagePreview" src="" class="img-fluid rounded-2xl shadow-2xl shadow-black/50"
                        alt="Preview" style="max-height: 90vh;">
                </div>
            </div>
        </div>
    </div>

    <!-- Incoming Call Modal -->
    <div class="modal fade" id="incomingCallModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-surface-container-high border-outline-variant/20 rounded-2xl p-6 text-center shadow-2xl">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-24 h-24 rounded-full bg-surface-variant overflow-hidden shadow-lg neon-glow-purple animate-pulse">
                        <img id="incomingCallImg" src="../ProfileSetup/Default_Image.jpg" class="w-full h-full object-cover" />
                    </div>
                    <div>
                        <h4 id="incomingCallerName" class="font-display-lg text-2xl text-on-surface">Caller Name</h4>
                        <p id="incomingCallType" class="text-on-surface-variant font-body-md uppercase tracking-widest mt-1">Incoming Video Call...</p>
                    </div>
                    <div class="flex gap-6 mt-4 w-full justify-center">
                        <button id="rejectCallBtn" class="w-16 h-16 rounded-full bg-error text-on-error flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-lg shadow-error/30">
                            <span class="material-symbols-outlined text-3xl">call_end</span>
                        </button>
                        <button id="acceptCallBtn" class="w-16 h-16 rounded-full bg-success text-white bg-green-500 flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-lg shadow-green-500/30">
                            <span class="material-symbols-outlined text-3xl">call</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Call Fullscreen Modal -->
    <div class="modal fade" id="activeCallModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-background border-0">
                <div class="modal-body p-0 relative flex items-center justify-center overflow-hidden">
                    
                    <!-- Remote Video Stream -->
                    <video id="remoteVideo" class="w-full h-full object-cover absolute inset-0 z-0" autoplay playsinline></video>
                    
                    <!-- Placeholder when Video is Off or Voice Call -->
                    <div id="remoteVideoPlaceholder" class="absolute inset-0 z-0 bg-surface flex flex-col items-center justify-center hidden">
                        <img id="activeCallUserImg" src="../ProfileSetup/Default_Image.jpg" class="w-32 h-32 rounded-full mb-4 shadow-xl shadow-primary/20" />
                        <h2 id="activeCallUserName" class="text-on-surface text-3xl font-display-lg">User</h2>
                        <p id="activeCallTimer" class="text-on-surface-variant mt-2">00:00</p>
                    </div>

                    <!-- Local Video Stream (PiP) -->
                    <video id="localVideo" class="w-32 h-48 md:w-48 md:h-64 object-cover absolute bottom-28 right-6 rounded-2xl z-10 shadow-2xl border-2 border-surface-variant/50" autoplay playsinline muted></video>

                    <!-- Controls -->
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 flex gap-4 glass-card px-6 py-4 rounded-full">
                        <button id="toggleMicBtn" class="w-12 h-12 rounded-full bg-surface-variant/50 text-on-surface flex items-center justify-center hover:bg-surface-variant transition-colors backdrop-blur-md">
                            <span id="micIcon" class="material-symbols-outlined">mic</span>
                        </button>
                        <button id="toggleCamBtn" class="w-12 h-12 rounded-full bg-surface-variant/50 text-on-surface flex items-center justify-center hover:bg-surface-variant transition-colors backdrop-blur-md">
                            <span id="camIcon" class="material-symbols-outlined">videocam</span>
                        </button>
                        <button id="endActiveCallBtn" class="w-16 h-12 rounded-full bg-error text-on-error flex items-center justify-center hover:bg-error/80 transition-colors shadow-lg shadow-error/30">
                            <span class="material-symbols-outlined">call_end</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- sweetalert JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- this is the link for the socket.io -->
    <script src="https://chatvia-backend.onrender.com/socket.io/socket.io.js"></script>

    <script src="../constant.js"></script>
    <script src="js/ThemeToggle.js"></script>
    <script src="js/globals.js"></script>
    <script src="js/RegisterUserInRealTime.js"></script>
    <script src="js/DynamicAddingAllPeople.js"></script>
    <script src="js/DynamicAddingChattedPeople.js"></script>
    <script src="js/loadPreviousChat.js"></script>
    <script src="js/SendMessage.js"></script>
    <script src="js/ReceiveMessage.js"></script>

    <script src="js/NavigateProfileSection.js"></script>
    <script src="js/scrollScreen.js"></script>
    <script src="js/WebRTC.js"></script>
    <script src="js/mobileNavigation.js"></script>

    <!-- Add a dummy close slider to prevent errors in JS -->
    <div id="closeSlider" style="display:none;"></div>
</body>

</html>
