<!DOCTYPE html>
<html class="dark" lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Chatvia - Login</title>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;700&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
                tailwind.config = {
                        darkMode: "class",
                        theme: {
                                extend: {
                                        "colors": {
                                                "on-surface": "#e5e1e4",
                                                "inverse-surface": "#e5e1e4",
                                                "tertiary": "#ffb4aa",
                                                "outline": "#9d8ba0",
                                                "surface": "#131315",
                                                "surface-container-low": "#1c1b1d",
                                                "on-tertiary": "#690003",
                                                "primary": "#ebb2ff",
                                                "secondary": "#bdf4ff",
                                                "inverse-primary": "#9800d0",
                                                "surface-container": "#201f21",
                                                "on-secondary-fixed-variant": "#004f58",
                                                "secondary-fixed-dim": "#00daf3",
                                                "surface-container-lowest": "#0e0e10",
                                                "on-primary-container": "#ffffff",
                                                "on-error": "#690005",
                                                "primary-fixed-dim": "#ebb2ff",
                                                "on-primary-fixed-variant": "#74009f",
                                                "on-background": "#e5e1e4",
                                                "surface-dim": "#131315",
                                                "surface-variant": "#353437",
                                                "tertiary-fixed-dim": "#ffb4aa",
                                                "background": "#131315",
                                                "inverse-on-surface": "#313032",
                                                "on-error-container": "#ffdad6",
                                                "error": "#ffb4ab",
                                                "primary-fixed": "#f8d8ff",
                                                "on-tertiary-fixed": "#410001",
                                                "on-surface-variant": "#d4c0d7",
                                                "on-primary": "#520072",
                                                "primary-container": "#bc13fe",
                                                "surface-tint": "#ebb2ff",
                                                "on-primary-fixed": "#320047",
                                                "surface-container-high": "#2a2a2c",
                                                "on-tertiary-fixed-variant": "#930005",
                                                "surface-bright": "#39393b",
                                                "surface-container-highest": "#353437",
                                                "tertiary-container": "#e62721",
                                                "on-secondary": "#00363d",
                                                "on-secondary-container": "#00616d",
                                                "secondary-fixed": "#9cf0ff",
                                                "outline-variant": "#504254",
                                                "on-tertiary-container": "#140000",
                                                "on-secondary-fixed": "#001f24",
                                                "secondary-container": "#00e3fd",
                                                "error-container": "#93000a",
                                                "tertiary-fixed": "#ffdad5"
                                        },
                                        "borderRadius": {
                                                "DEFAULT": "0.25rem",
                                                "lg": "0.5rem",
                                                "xl": "0.75rem",
                                                "full": "9999px"
                                        },
                                        "spacing": {
                                                "panel-width-sm": "320px",
                                                "margin-desktop": "40px",
                                                "unit": "8px",
                                                "margin-mobile": "20px",
                                                "gutter": "16px",
                                                "panel-width-md": "400px"
                                        },
                                        "fontFamily": {
                                                "title-sm": ["Outfit"],
                                                "label-sm": ["Inter"],
                                                "headline-md": ["Outfit"],
                                                "body-lg": ["Inter"],
                                                "display-lg": ["Outfit"],
                                                "body-md": ["Inter"],
                                                "headline-md-mobile": ["Outfit"],
                                                "label-bold": ["Inter"]
                                        },
                                        "fontSize": {
                                                "title-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                                                "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                                                "headline-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                                                "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                                                "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                                                "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                                                "headline-md-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                                                "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                                        }
                                },
                        },
                }
        </script>
        <link rel="stylesheet" href="Login.css">
        <link rel="stylesheet" href="../responsive_code/login-responsive.css">
</head>

<body class="bg-background text-on-surface font-body-md selection:bg-primary/30">
        <!-- Background Orbs Wrapper -->
        <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                <div class="floating-orb w-96 h-96 bg-primary-container top-[-10%] left-[-10%]"></div>
                <div class="floating-orb w-[500px] h-[500px] bg-secondary-container bottom-[-20%] right-[-10%]"
                        style="animation-delay: -5s;"></div>
        </div>
        <!-- Login Container -->
        <main class="w-full max-w-[440px] px-margin-mobile md:px-0 z-10">
                <div class="glass-card rounded-[32px] p-8 md:p-10 flex flex-col items-center">
                        <!-- Logo Section -->
                        <div class="mb-10 text-center">
                                <div
                                        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container/20 border border-primary/30 mb-6 group">
                                        <span class="material-symbols-outlined text-primary text-[32px] group-hover:scale-110 transition-transform duration-500"
                                                data-icon="auto_awesome"
                                                style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                                </div>
                                <h1 class="font-display-lg text-primary tracking-tight mb-2">Chatvia</h1>

                        </div>
                        <!-- Login Form -->
                        <form id="loginForm" class="w-full space-y-6" onsubmit="event.preventDefault();">
                                <!-- Email Field -->
                                <div class="space-y-2">
                                        <label class="font-label-bold text-label-bold text-on-surface-variant ml-1"
                                                for="usernameInput">Email Address</label>
                                        <div class="relative group">
                                                <div
                                                        class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
                                                        <span class="material-symbols-outlined text-[20px]"
                                                                data-icon="mail">mail</span>
                                                </div>
                                                <input autocomplete="off" class="w-full bg-surface-container-low/50 border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/60 transition-all duration-300 backdrop-blur-md"
                                                        id="usernameInput" placeholder="name@example.com"
                                                        type="email" />
                                        </div>
                                </div>
                                <!-- Password Field -->
                                <div class="space-y-2">
                                        <div class="flex justify-between items-center ml-1">
                                                <label class="font-label-bold text-label-bold text-on-surface-variant"
                                                        for="passwordInput">Password</label>
                                                <a class="text-label-sm font-label-sm text-primary hover:text-primary-fixed-dim transition-colors cursor-pointer"
                                                        id="forgotPasswordLink">Forgot password?</a>
                                        </div>
                                        <div class="relative group">
                                                <div
                                                        class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
                                                        <span class="material-symbols-outlined text-[20px]"
                                                                data-icon="lock">lock</span>
                                                </div>
                                                <input autocomplete="off" class="w-full bg-surface-container-low/50 border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-12 text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/60 transition-all duration-300 backdrop-blur-md"
                                                        id="passwordInput" placeholder="••••••••" type="password" />
                                                <button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer tap-highlight-transparent"
                                                        id="toggleEyePwd" type="button">
                                                        <span class="material-symbols-outlined text-[20px]"
                                                                data-icon="visibility" id="eyeIconPwd">visibility</span>
                                                </button>
                                        </div>
                                </div>
                                <!-- Remember Me -->
                                <div class="flex items-center space-x-3 ml-1">
                                        <div class="relative flex items-center">
                                                <input autocomplete="off" class="w-5 h-5 rounded border-outline-variant/30 bg-surface-container-low text-primary focus:ring-primary/40 focus:ring-offset-surface transition-all cursor-pointer"
                                                        id="remember" type="checkbox" />
                                        </div>
                                        <label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer select-none"
                                                for="remember">Keep me logged in</label>
                                </div>
                                <!-- CTA Button -->
                                <button type="button" id="LoginButton"
                                        class="w-full bg-primary-container text-on-primary-container font-label-bold text-label-bold py-4 rounded-xl inner-glow neon-glow hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-2">
                                        Login
                                </button>
                                <!-- Footer Links -->
                                <div class="pt-4 text-center">
                                        <p class="font-body-md text-on-surface-variant">
                                                Don't have an account?
                                                <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/40 ml-1 transition-all"
                                                        href="../SignUp/SignUp.html">Sign up</a>
                                        </p>
                                </div>
                        </form>

                </div>

        </main>

        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-background/80 backdrop-blur-sm p-4">
                <div class="bg-surface-container border border-outline-variant/30 rounded-2xl p-8 max-w-md w-full shadow-2xl relative animate-[fadeIn_0.3s_ease-out]">
                        <button id="closeForgotModalBtn" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">close</span>
                        </button>
                        <h3 class="font-headline-md text-[24px] text-primary mb-2">Forgot Password</h3>
                        <p id="forgotModalDesc" class="font-body-md text-on-surface-variant mb-6">Enter your registered email address to receive an OTP.</p>
                        
                        <div id="forgotEmailStep" class="space-y-4 block">
                                <div>
                                        <label class="block font-label-bold text-label-bold text-primary mb-1">Email Address</label>
                                        <input autocomplete="off" type="email" id="forgotEmailInput" class="w-full bg-surface-variant/30 border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface font-body-md focus:border-primary/50 focus:outline-none transition-colors" placeholder="name@example.com">
                                </div>
                                <button id="sendForgotOtpBtn" class="w-full mt-6 px-8 py-3 bg-primary text-on-primary rounded-lg transition-all font-label-bold text-label-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95">
                                        Send OTP
                                </button>
                        </div>

                        <div id="forgotOtpStep" class="space-y-4 hidden">
                                <div>
                                        <label class="block font-label-bold text-label-bold text-primary mb-1">6-Digit OTP</label>
                                        <input autocomplete="off" type="text" id="forgotOtpInput" maxlength="6" class="w-full bg-surface-variant/30 border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface font-body-md focus:border-primary/50 focus:outline-none transition-colors text-center text-xl tracking-[0.5em]" placeholder="------">
                                </div>
                                <button id="verifyForgotOtpBtn" class="w-full mt-6 px-8 py-3 bg-primary text-on-primary rounded-lg transition-all font-label-bold text-label-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95">
                                        Verify OTP
                                </button>
                        </div>
                </div>
        </div>

         <script src="../constant.js"></script>
        <script src="EyeLogic.js"></script>
        <script src="Login.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
