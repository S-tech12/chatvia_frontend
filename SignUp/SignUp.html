<!DOCTYPE html>
<html class="dark" lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Sign Up | Chatvia</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;700&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <link rel="stylesheet" href="SignUp.css">
        <link rel="stylesheet" href="../responsive_code/signup-responsive.css">
        <script id="tailwind-config">
                tailwind.config = {
                        darkMode: "class",
                        theme: {
                                extend: {
                                        "colors": {
                                                "on-surface": "#e5e1e4",
                                                "inverse-surface": "#e5e1e4",
                                                "tertiary": "#ffb4aa",
                                                "outline": "#9d8ba0",
                                                "surface": "#131315",
                                                "surface-container-low": "#1c1b1d",
                                                "on-tertiary": "#690003",
                                                "primary": "#ebb2ff",
                                                "secondary": "#bdf4ff",
                                                "inverse-primary": "#9800d0",
                                                "surface-container": "#201f21",
                                                "on-secondary-fixed-variant": "#004f58",
                                                "secondary-fixed-dim": "#00daf3",
                                                "surface-container-lowest": "#0e0e10",
                                                "on-primary-container": "#ffffff",
                                                "on-error": "#690005",
                                                "primary-fixed-dim": "#ebb2ff",
                                                "on-primary-fixed-variant": "#74009f",
                                                "on-background": "#e5e1e4",
                                                "surface-dim": "#131315",
                                                "surface-variant": "#353437",
                                                "tertiary-fixed-dim": "#ffb4aa",
                                                "background": "#131315",
                                                "inverse-on-surface": "#313032",
                                                "on-error-container": "#ffdad6",
                                                "error": "#ffb4ab",
                                                "primary-fixed": "#f8d8ff",
                                                "on-tertiary-fixed": "#410001",
                                                "on-surface-variant": "#d4c0d7",
                                                "on-primary": "#520072",
                                                "primary-container": "#bc13fe",
                                                "surface-tint": "#ebb2ff",
                                                "on-primary-fixed": "#320047",
                                                "surface-container-high": "#2a2a2c",
                                                "on-tertiary-fixed-variant": "#930005",
                                                "surface-bright": "#39393b",
                                                "surface-container-highest": "#353437",
                                                "tertiary-container": "#e62721",
                                                "on-secondary": "#00363d",
                                                "on-secondary-container": "#00616d",
                                                "secondary-fixed": "#9cf0ff",
                                                "outline-variant": "#504254",
                                                "on-tertiary-container": "#140000",
                                                "on-secondary-fixed": "#001f24",
                                                "secondary-container": "#00e3fd",
                                                "error-container": "#93000a",
                                                "tertiary-fixed": "#ffdad5"
                                        },
                                        "borderRadius": {
                                                "DEFAULT": "0.25rem",
                                                "lg": "0.5rem",
                                                "xl": "0.75rem",
                                                "full": "9999px"
                                        },
                                        "spacing": {
                                                "panel-width-sm": "320px",
                                                "margin-desktop": "40px",
                                                "unit": "8px",
                                                "margin-mobile": "20px",
                                                "gutter": "16px",
                                                "panel-width-md": "400px"
                                        },
                                        "fontFamily": {
                                                "title-sm": ["Outfit"],
                                                "label-sm": ["Inter"],
                                                "headline-md": ["Outfit"],
                                                "body-lg": ["Inter"],
                                                "display-lg": ["Outfit"],
                                                "body-md": ["Inter"],
                                                "headline-md-mobile": ["Outfit"],
                                                "label-bold": ["Inter"]
                                        },
                                        "fontSize": {
                                                "title-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                                                "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                                                "headline-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                                                "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                                                "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                                                "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                                                "headline-md-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                                                "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                                        }
                                },
                        },
                }
        </script>
</head>

<body
        class="bg-mesh min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">
        <!-- Decorative Elements -->
        <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full floating">
        </div>
        <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full floating"
                style="animation-delay: -2s;"></div>
        <main class="relative z-10 w-full max-w-[480px]">
                <!-- Brand Identity -->
                <div class="text-center mb-8">
                        <h1 class="font-display-lg text-primary tracking-tight mb-2">Chatvia</h1>

                </div>
                <!-- Glassmorphic Card -->
                <div class="glass-border backdrop-blur-[24px] p-8 md:p-10 rounded-xl shadow-2xl shadow-black/40">
                        <header class="mb-8">
                                <h2 class="font-headline-md-mobile md:font-headline-md text-on-surface mb-2">Create
                                        Account</h2>

                        </header>
                        <form class="space-y-5">
                                <!-- Full Name -->
                                <div class="space-y-2">
                                        <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                for="UserFullName">Full Name</label>
                                        <div class="relative group">
                                                <span
                                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
                                                <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                        id="UserFullName" placeholder="Alexander Chatvia" type="text"
                                                        required />
                                        </div>
                                </div>
                                <!-- Username & Mobile Number -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                                <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                        for="UserName">Username</label>
                                                <div class="relative group">
                                                        <span
                                                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">badge</span>
                                                        <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                                id="UserName" placeholder="alex.Chatvia" type="text"
                                                                required />
                                                </div>
                                        </div>
                                        <div class="space-y-2">
                                                <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                        for="UserMobileNumber">Mobile Number</label>
                                                <div class="relative group">
                                                        <span
                                                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">phone</span>
                                                        <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                                id="UserMobileNumber" placeholder="0000000000"
                                                                type="text" required />
                                                </div>
                                        </div>
                                </div>
                                <!-- Email -->
                                <div class="space-y-2">
                                        <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                for="UserEmail">Email Address</label>
                                        <div class="relative group">
                                                <span
                                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
                                                <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                        id="UserEmail" placeholder="name@domain.com" type="email"
                                                        required />
                                        </div>
                                </div>
                                <!-- Password Grid -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                                <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                        for="UserPassword">Password</label>
                                                <div class="relative group">
                                                        <span
                                                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
                                                        <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                                id="UserPassword" placeholder="••••••••" type="password"
                                                                required />
                                                </div>
                                        </div>
                                        <div class="space-y-2">
                                                <label class="font-label-bold text-on-surface-variant block uppercase tracking-widest text-[10px]"
                                                        for="UserConfirmPassword">Confirm</label>
                                                <div class="relative group">
                                                        <span
                                                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">shield</span>
                                                        <input autocomplete="off" class="w-full bg-surface-container-low/40 border border-outline-variant/30 rounded-lg py-3.5 pl-12 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40"
                                                                id="UserConfirmPassword" placeholder="••••••••"
                                                                type="password" required />
                                                </div>
                                        </div>
                                </div>

                                <!-- CTA Button -->
                                <button id="SignUpButton"
                                        class="w-full bg-primary-container text-white py-4 rounded-xl font-title-sm neon-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2 group relative overflow-hidden"
                                        type="button">
                                        <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"
                                                style="background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, transparent 100%);">
                                        </div>
                                        <span>Create Account</span>
                                        <span
                                                class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
                                </button>
                        </form>
                        <!-- Login Redirect -->
                        <footer class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
                                <p class="font-body-md text-on-surface-variant">
                                        Already have an account?
                                        <a class="text-primary font-bold hover:text-primary-container transition-colors ml-1"
                                                href="../Login/Login.html">Log In</a>
                                </p>
                        </footer>
                </div>

        </main>
        <!-- Visual Polish: Interactive Grain Overlay -->
        <div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
                <svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <filter id="noiseFilter">
                                <feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch"
                                        type="fractalNoise"></feturbulence>
                        </filter>
                        <rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
                </svg>
        </div>
        <script>
                // Micro-interaction for input fields
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                        input.addEventListener('focus', () => {
                                input.parentElement.parentElement.classList.add('scale-[1.01]');
                        });
                        input.addEventListener('blur', () => {
                                input.parentElement.parentElement.classList.remove('scale-[1.01]');
                        });
                });

                // Simple button press effect
                const btn = document.getElementById('SignUpButton');
                if (btn) {
                        btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
                        btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
                }
        </script>

        <!-- Link to JS files -->
         <script src="../constant.js"></script>
        <script src="SignUp.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
